name: mira
description: "Mira — the calm parenting companion. A beautiful, private baby & toddler tracker with an AI coach for the tough moments."
publish_to: "none"
version: 0.2.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shared_preferences: ^2.3.2
  http: ^1.2.2
  intl: ^0.19.0
  speech_to_text: ^7.0.0
  pdf: ^3.11.1
  printing: ^5.13.3
  video_player: ^2.9.2
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/intro/
    - assets/mom/
