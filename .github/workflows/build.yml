name: Build Mira APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # A single, persistent signing key so every build is signed identically.
      # Generated once on the first run, committed, then reused — this is what
      # lets the app UPDATE on your phone without "App not installed".
      - name: Stable signing key
        run: |
          mkdir -p ~/.android
          if [ -f ci/debug.keystore ]; then
            echo "Reusing committed signing key."
            cp ci/debug.keystore ~/.android/debug.keystore
          else
            echo "Generating persistent signing key (one-time)."
            keytool -genkeypair -v -keystore ~/.android/debug.keystore \
              -storepass android -keypass android -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Mira,C=US"
            mkdir -p ci
            cp ~/.android/debug.keystore ci/debug.keystore
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add ci/debug.keystore
            git commit -m "ci: add persistent signing key [skip ci]"
            git push
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      # The repo stays lean (just lib/ + pubspec). CI generates the Android
      # project files on the fly so nothing platform-specific is committed.
      - name: Generate Android project files
        run: flutter create --org com.miraapp --project-name mira --platforms=android .

      - name: Apply custom Android manifest (INTERNET + mic + app name)
        run: cp ci/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mira-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
